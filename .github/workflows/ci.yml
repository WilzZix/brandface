name: CI

# Runs on pull requests to main and on pushes to any non-main branch.
# Main pushes are handled by android-deploy.yml (which also analyzes + tests).
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # The project carries some pre-existing lint warnings/infos; only real
      # errors should fail CI. Tighten these flags once the debt is cleaned.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test
