name: Android Deploy (Play Internal)

# On every push to main: analyze, test, build a signed app bundle and upload it
# to the Google Play "internal" testing track.
on:
  push:
    branches: [main]

# Avoid overlapping deploys clobbering each other.
concurrency:
  group: android-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Play (internal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      # ── Signing ────────────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      # Play requires a unique, increasing versionCode per upload. Derive it
      # from the workflow run number with an offset so it stays above the
      # manually-uploaded builds (14/15). versionName stays as pubspec's.
      - name: Build app bundle
        run: flutter build appbundle --release --build-number=$((100 + GITHUB_RUN_NUMBER))

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Upload to Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.digitalx.Influerax
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
